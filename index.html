<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marômetro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kablammo&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#b91d73,#f953c6);
    font-family:Arial,sans-serif;
    color:white;
}

main {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
    padding:40px;
    width:100%;
    max-width:500px;
    text-align:center;
}

h1 {
    font-size:4rem;
    font-family:"Kablammo", system-ui;
}

select {
    width:250px;
    padding:12px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    margin-top: 40px;
}

.gauge {
    width:100%;
    max-width:380px;
    position:relative;
}

.gauge svg {
    width:100%;
    margin-bottom:100px;
}

.gauge-value {
    position:absolute;
    bottom:35px;
    width:100%;
    text-align:center;
    font-size:34px;
    font-weight:bold;
}

.city {
    font-size:16px;
    opacity:0.7;
}

#resultado {
    opacity:0;
    transform:translateY(20px);
    transition:0.6s ease;
    display:none;
}

.fade-out { opacity:0; transform:translateY(-20px); }
.fade-in { opacity:1 !important; transform:translateY(0) !important; }

#aviso { margin-top:15px; font-size:14px; font-weight:bold; }
#calcado-escolhido { font-size:14px; margin-top:5px; opacity:0.8; }

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 10px auto;
}

@keyframes girar {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}


</style>
</head>

<body>

<main>
<h1>Marômetro</h1>

<div id="intro">
    <label>Como a mara está calçada hoje?</label>

    <div id="loader" class="loader"></div>

    <select id="tipo-calcado" disabled style="display:none;">
        <option value="">Selecione</option>
        <option value="descalco">Descalço</option>
        <option value="sandalia">Sandália / Rasteirinha</option>
        <option value="sapatilha">Sapatilha</option>
        <option value="tenis">Tênis</option>
        <option value="bota">Galocha / Bota</option>
    </select>
</div>

<div id="resultado">
    <div class="gauge">
        <svg viewBox="0 0 320 200">
            <defs>
                <linearGradient id="gradiente" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00c6ff"/>
                    <stop offset="50%" stop-color="#f9d423"/>
                    <stop offset="100%" stop-color="#ff4e50"/>
                </linearGradient>
            </defs>

            <path d="M20 160 A120 120 0 0 1 300 160"
                  stroke="#ffffff30"
                  stroke-width="20"
                  fill="none"/>

            <path id="barra"
                  d="M20 160 A120 120 0 0 1 300 160"
                  stroke="url(#gradiente)"
                  stroke-width="20"
                  stroke-linecap="round"
                  fill="none"
                  stroke-dasharray="377"
                  stroke-dashoffset="377"
                  style="transition: stroke-dashoffset 1s ease-out;"/>
        </svg>

        <div class="gauge-value">
            <div id="temp">--°C</div>
            <div class="city">São Paulo</div>
            <div id="calcado-escolhido"></div>
            <div id="aviso"></div>
        </div>
    </div>
</div>

</main>

<script>
let temperaturaReal = null;

async function buscarTemperatura() {
    const latitude = -23.666802128659853;
    const longitude = -46.711766010926425;

    try {
        const response = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
        );

        const data = await response.json();
        temperaturaReal = Number(data.current_weather.temperature);

        atualizarGauge(temperaturaReal);

        // 🔥 Esconde loader e mostra select
        document.getElementById("loader").style.display = "none";

        const select = document.getElementById("tipo-calcado");
        select.style.display = "block";
        select.disabled = false;

    } catch (error) {
        document.getElementById("loader").style.display = "none";
        document.getElementById("temp").textContent = "Erro";
        console.error(error);
    }
}
function atualizarGauge(temp) {
    const min = -10;
    const max = 50;

    // Impede estourar o arco
    const tempLimitada = Math.max(min, Math.min(max, temp));

    const percentual = (tempLimitada - min) / (max - min);

    const barra = document.getElementById("barra");
    const comprimentoTotal = 377;
    const offset = comprimentoTotal - (percentual * comprimentoTotal);

    barra.style.strokeDashoffset = offset;
    document.getElementById("temp").textContent = temp.toFixed(1) + "°C";
}

function aplicarCalcado(tipo) {

    if (temperaturaReal === null) {
        alert("Aguarde, carregando temperatura...");
        return;
    }

    let ajuste = 0;
    let aviso = "";
    let nome = "";

    switch(tipo) {
        case "descalco":
            ajuste = -5;
            aviso = "⚠️ Procure abrigo essa combinação pode causar tempestades";
            nome = "Descalço";
            break;
        case "sandalia":
            ajuste = -2.5;
            aviso = "⚠️ Risco de chuva forte e alagamento";
            nome = "Sandália / Rasteirinha";
            break;
        case "sapatilha":
            ajuste = 0;
            aviso = "⚠️ Chance de garoa";
            nome = "Sapatilha";
            break;
        case "tenis":
            ajuste = 2.5;
            aviso = "⚠️ Hidrate-se, risco de aumento de temperatura";
            nome = "Tênis";
            break;
        case "bota":
            ajuste = 5;
            aviso = "⚠️ Risco de ondas de calor extremamente forte. Procure abrigo.";
            nome = "Galocha / Bota";
            break;
    }

    const temperaturaFinal = temperaturaReal + ajuste;

    atualizarGauge(temperaturaFinal);

    document.getElementById("aviso").textContent = aviso;
    document.getElementById("calcado-escolhido").textContent =
    "Mara de " + nome + " + " + temperaturaReal.toFixed(1) + "°C";
}

document.getElementById("tipo-calcado").addEventListener("change", function() {

    if(!this.value) return;

    aplicarCalcado(this.value);

    const intro = document.getElementById("intro");
    const resultado = document.getElementById("resultado");

    intro.classList.add("fade-out");

    setTimeout(() => {
        intro.style.display = "none";
        resultado.style.display = "block";

        setTimeout(() => {
            resultado.classList.add("fade-in");
        }, 50);

    }, 600);
});

buscarTemperatura();
</script>

</body>
</html>
